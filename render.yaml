services:
  - type: web
    name: crypto-escrow-bot
    env: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: WEB3_PROVIDER
        sync: false
      - key: TRON_PROVIDER
        sync: false
      - key: ADMIN_IDS
        sync: false
      - key: ESCROW_FEE
        value: 0.5
    autoDeploy: true
    healthCheckPath: /
    healthCheckTimeout: 100